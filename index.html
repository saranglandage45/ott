<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JioHotstar Clone</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0c111b;
  color: white;
}

/* HEADER */
header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  background: #0c111b;
  position: sticky;
  top: 0;
  z-index: 100;
}

header h1 {
  color: #1f80e0;
}

header input, header select {
  padding: 8px;
  border-radius: 5px;
  border: none;
}

header button {
  background: #1f80e0;
  border: none;
  padding: 8px 12px;
  color: white;
  border-radius: 5px;
}

/* HERO */
.hero {
  height: 450px;
  position: relative;
  display: flex;
  align-items: center;
  padding: 40px;
  transition: 0.5s;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, #0c111b 20%, transparent);
}

.hero-content {
  position: relative;
  max-width: 500px;
}

.hero h1 {
  font-size: 42px;
}

.hero button {
  background: #1f80e0;
  border: none;
  padding: 12px 20px;
  border-radius: 6px;
  color: white;
  margin-top: 10px;
}

/* GRID */
.grid {
  display: flex;
  gap: 15px;
  padding: 20px;
  overflow-x: auto;
}

/* HIDE SCROLLBAR */
.grid::-webkit-scrollbar {
  display: none;
}
.grid {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

/* CARD */
.card {
  min-width: 180px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.1);
}

.card img {
  width: 100%;
  height: 260px;
  border-radius: 8px;
  object-fit: cover;
}

.card h3 {
  margin: 5px 0 0;
  font-size: 14px;
}

.card p {
  font-size: 12px;
  color: #aaa;
}
</style>

</head>

<body>

<header>
  <h1>JioHotstar</h1>
  <input type="text" id="searchBox" placeholder="Search movies...">
  <select id="genreFilter">
    <option value="">All</option>
    <option value="action">Action</option>
    <option value="comedy">Comedy</option>
    <option value="drama">Drama</option>
  </select>
  <button onclick="searchMovies()">Search</button>
</header>

<!-- HERO -->
<section id="hero" class="hero">
  <div class="hero-content">
    <h1 id="heroTitle"></h1>
    <p id="heroDesc"></p>
    <button>▶ Watch Now</button>
  </div>
</section>

<h2 style="padding-left:20px;">Latest & Trending</h2>
<div id="movieList" class="grid"></div>

<h2 style="padding-left:20px;">Recommended For You</h2>
<div id="recommendedList" class="grid"></div>

<script>
const movies = [
  {
    id: 1,
    name: "Avengers Endgame",
    genre: "action",
    rating: 9,
    image: "https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg",
    banner: "https://image.tmdb.org/t/p/original/7RyHsO4yDXtBv1zUU3mTpHeQ0d5.jpg",
    desc: "The Avengers assemble for one final battle."
  },
  {
    id: 2,
    name: "The Batman",
    genre: "action",
    rating: 8,
    image: "https://image.tmdb.org/t/p/w500/74xTEgt7R36Fpooo50r9T25onhq.jpg",
    banner: "https://image.tmdb.org/t/p/original/b0PlSFdDwbyK0cf5RxwDpaOJQvQ.jpg",
    desc: "Dark, gritty Gotham story."
  },
  {
    id: 3,
    name: "Superbad",
    genre: "comedy",
    rating: 7,
    image: "https://image.tmdb.org/t/p/w500/ek8e8txUyUwd2BNqj6lFEerJfbq.jpg",
    banner: "https://image.tmdb.org/t/p/original/7sfbEnaARXDDhKm0CZ7D7uc2sbo.jpg",
    desc: "Teen chaos and comedy."
  },
  {
    id: 4,
    name: "Hangover",
    genre: "comedy",
    rating: 8,
    image: "https://image.tmdb.org/t/p/w500/uluhlXubGu1VxU63X9VHCLWDAYP.jpg",
    banner: "https://image.tmdb.org/t/p/original/9pkZesKMnblFfKxEhQx45YQ2kIe.jpg",
    desc: "Vegas trip gone wrong."
  },
  {
    id: 5,
    name: "Titanic",
    genre: "drama",
    rating: 9,
    image: "https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg",
    banner: "https://image.tmdb.org/t/p/original/s2bT29y0ngXxxu2IA8AOzzXTRhd.jpg",
    desc: "Love story on a sinking ship."
  },
  {
    id: 6,
    name: "Joker",
    genre: "drama",
    rating: 9,
    image: "https://image.tmdb.org/t/p/w500/udDclJoHjfjb8Ekgsd4FDteOkCU.jpg",
    banner: "https://image.tmdb.org/t/p/original/n6bUvigpRFqSwmPp1m2YADdbRBc.jpg",
    desc: "Origin of chaos."
  }
];

// DISPLAY
function displayMovies(list, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  list.forEach(movie => {
    container.innerHTML += `
      <div class="card">
        <img src="${movie.image}">
        <h3>${movie.name}</h3>
        <p>${movie.genre} • ⭐ ${movie.rating}</p>
      </div>
    `;
  });
}

displayMovies(movies, "movieList");

// HERO AUTO CHANGE
let index = 0;

function updateHero() {
  const hero = document.getElementById("hero");
  const title = document.getElementById("heroTitle");
  const desc = document.getElementById("heroDesc");

  const movie = movies[index];

  hero.style.background = `url(${movie.banner}) center/cover no-repeat`;
  title.innerText = movie.name;
  desc.innerText = movie.desc;

  index = (index + 1) % movies.length;
}

setInterval(updateHero, 3000);
updateHero();

// SEARCH
function searchMovies() {
  const query = document.getElementById("searchBox").value.toLowerCase();
  const genre = document.getElementById("genreFilter").value;

  let filtered = movies.filter(m =>
    m.name.toLowerCase().includes(query)
  );

  if (genre) filtered = filtered.filter(m => m.genre === genre);

  displayMovies(filtered, "movieList");
  recommendMovies(filtered);
}

// RECOMMEND
function recommendMovies(selected) {
  let rec = [];

  selected.forEach(sm => {
    rec = rec.concat(
      movies.filter(m =>
        m.id !== sm.id &&
        (m.genre === sm.genre || Math.abs(m.rating - sm.rating) <= 1)
      )
    );
  });

  rec = [...new Map(rec.map(i => [i.id, i])).values()];
  displayMovies(rec, "recommendedList");
}
</script>

</body>
</html>
